{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <h1>📝 Регистрация</h1>
        <p class="auth-subtitle">Создайте новый аккаунт</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Придумайте логин" required>
                <div class="form-help">Только буквы и цифры</div>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Не менее 6 символов" required>
            </div>
            <div class="form-group">
                <label for="bio">О себе</label>
                <textarea id="bio" name="bio" class="form-control" placeholder="Расскажите немного о себе..." rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
        </form>

        <div class="form-footer">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>
</div>

{% endblock %}
